name: Daily Stock & Sector Scoring

on:
  schedule:
    - cron: "30 21 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run-daily-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily pipeline
        run: python run_daily.py

      - name: Generate static dashboard
        run: python generate_html.py

      - name: Commit updated history and dashboard back to the repo
        run: |
          git config user.name "daily-pipeline-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/ docs/
          git diff --cached --quiet && echo "No changes to commit." || git commit -m "Daily run: $(date -u +%Y-%m-%d)"
          git push
