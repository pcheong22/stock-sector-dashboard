<title>Stock & Sector Rankings</title>
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d27; --border: #2d3147;
    --text: #e0e0e0; --muted: #888; --accent: #4f8ef7;
    --green: #2ecc71; --red: #e74c3c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; padding: 24px; }
  h1 { font-size: 1.4rem; margin-bottom: 16px; color: var(--accent); }
  .controls { display: flex; gap: 12px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
  select { background: var(--surface); color: var(--text); border: 1px solid var(--border);
            padding: 6px 10px; border-radius: 6px; font-size: 0.9rem; cursor: pointer; }
  .tabs { display: flex; gap: 4px; margin-bottom: 16px; border-bottom: 1px solid var(--border); }
  .tab { padding: 8px 16px; cursor: pointer; border-radius: 6px 6px 0 0; font-size: 0.9rem;
          color: var(--muted); border: 1px solid transparent; border-bottom: none; }
  .tab.active { color: var(--text); background: var(--surface); border-color: var(--border); }
  .panel { display: none; } .panel.active { display: block; }
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  th { background: var(--surface); padding: 8px 10px; text-align: left;
        border-bottom: 2px solid var(--border); color: var(--muted);
        font-weight: 600; white-space: nowrap; cursor: pointer; user-select: none; }
  th:hover { color: var(--text); }
  td { padding: 7px 10px; border-bottom: 1px solid var(--border); white-space: nowrap; }
  tr:hover td { background: var(--surface); }
  .up { color: var(--green); } .down { color: var(--red); }
  .bar-wrap { margin-top: 20px; }
  .bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 0.82rem; }
  .bar-label { width: 160px; text-align: right; color: var(--muted); flex-shrink: 0; }
  .bar-track { flex: 1; background: var(--surface); border-radius: 4px; height: 18px; }
  .bar-fill { height: 100%; background: var(--accent); border-radius: 4px;
               transition: width 0.4s; display: flex; align-items: center;
               padding-left: 6px; font-size: 0.78rem; color: #fff; white-space: nowrap; }
  .caption { color: var(--muted); font-size: 0.8rem; margin-bottom: 10px; }
  #drill-sector { margin-bottom: 14px; }
</style>
</head>

// ── formatting ────────────────────────────────────────────────────────────
const PCT_COLS = new Set(["ret_1M","ret_3M","ret_6M","ret_12M",
  "dist_from_52w_high","dist_from_52w_low","realized_vol_21d",
  "rel_ret_3M_vs_market","rel_ret_3M_vs_sector","BreadthPct"]);
const DOLLAR_COLS = new Set(["Price"]);
const SCORE_COLS  = new Set(["GlobalScore","SectorScore","AvgGlobalScore","MedianGlobalScore"]);
const CHANGE_COLS = new Set(["ScoreChange","BreadthChange"]);

function fmt(col, val) {
  if (val === null || val === undefined || val === "") return "—";
  if (DOLLAR_COLS.has(col)) return "$" + Number(val).toFixed(2);
  if (PCT_COLS.has(col))    return (Number(val)*100).toFixed(1) + "%";
  if (col === "rsi_14")     return Number(val).toFixed(0);
  if (col === "trend_r2_63d") return Number(val).toFixed(2);
  if (SCORE_COLS.has(col))  return Number(val).toFixed(1);
  if (CHANGE_COLS.has(col)) {
    const n = Number(val);
    const suffix = col === "BreadthChange" ? "pp" : "";
    const arrow  = n > 0 ? "▲" : n < 0 ? "▼" : "→";
    const cls    = n > 0 ? "up" : n < 0 ? "down" : "";
    return `<span class="${cls}">${arrow} ${n > 0 ? "+" : ""}${n.toFixed(1)}${suffix}</span>`;
  }
  return val;
}

// ── table builder ─────────────────────────────────────────────────────────
function buildTable(tableEl, cols, rows, rankOffset=1) {
  let sortCol = -1, sortAsc = false;
  function render(data) {
    const head = "<thead><tr>" +
      (rankOffset ? "<th>#</th>" : "") +
      cols.map((c,i) => `<th data-i="${i}">${c}</th>`).join("") +
      "</tr></thead>";
    const body = "<tbody>" + data.map((row, ri) =>
      "<tr>" +
      (rankOffset ? `<td style="color:var(--muted)">${ri+rankOffset}</td>` : "") +
      row.map((v,i) => `<td>${fmt(cols[i], v)}</td>`).join("") +
      "</tr>"
    ).join("") + "</tbody>";
    tableEl.innerHTML = head + body;
    tableEl.querySelectorAll("th[data-i]").forEach(th => {
      th.addEventListener("click", () => {
        const i = +th.dataset.i;
        if (sortCol === i) sortAsc = !sortAsc; else { sortCol = i; sortAsc = false; }
        const sorted = [...data].sort((a,b) => {
          const av = a[i], bv = b[i];
          if (av === null) return 1; if (bv === null) return -1;
          return sortAsc ? (av > bv ? 1 : -1) : (av < bv ? 1 : -1);
        });
        render(sorted);
      });
    });
  }
  render(rows);
}

// ── bar chart ─────────────────────────────────────────────────────────────
function buildBars(el, rows, cols) {
  const si = cols.indexOf("Sector"), vi = cols.indexOf("AvgGlobalScore");
  const max = Math.max(...rows.map(r => r[vi]));
  el.innerHTML = rows.map(r => {
    const pct = (r[vi] / max * 100).toFixed(1);
    return `<div class="bar-row">
      <div class="bar-label">${r[si]}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%">${Number(r[vi]).toFixed(1)}</div></div>
    </div>`;
  }).join("");
}

// ── render ────────────────────────────────────────────────────────────────
function render(dateStr) {
  const d = DB.data[dateStr];
  document.getElementById("meta").textContent =
    d.global_rows.length + " tickers scored";

  // sector
  const hasPrior = d.sector_cols.includes("ScoreChange");
  document.getElementById("sector-caption").textContent =
    hasPrior ? "Changes vs. prior stored date." : "No prior date for comparison yet.";
  buildTable(document.getElementById("sector-table"), d.sector_cols, d.sector_rows, 1);
  buildBars(document.getElementById("sector-bars"), d.sector_rows, d.sector_cols);

  // global
  buildTable(document.getElementById("global-table"), d.global_cols, d.global_rows, 1);

  // drill sectors
  const ds = document.getElementById("drill-sector");
  const prev = ds.value;
  ds.innerHTML = Object.keys(d.drill).sort().map(s =>
    `<option value="${s}">${s}</option>`).join("");
  if (prev && d.drill[prev]) ds.value = prev;
  renderDrill(d);
}

function renderDrill(d) {
  const sector = document.getElementById("drill-sector").value;
  if (!d || !d.drill[sector]) return;
  buildTable(document.getElementById("drill-table"), d.drill_cols, d.drill[sector], 1);
}

// ── init ──────────────────────────────────────────────────────────────────
const dateSelect = document.getElementById("date-select");
DB.dates.forEach(d => {
  const o = document.createElement("option");
  o.value = o.textContent = d;
  dateSelect.appendChild(o);
});
dateSelect.value = DB.latest;

dateSelect.addEventListener("change", () => render(dateSelect.value));

document.getElementById("drill-sector").addEventListener("change", () => {
  renderDrill(DB.data[dateSelect.value]);
});

document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".tab,.panel").forEach(el => el.classList.remove("active"));
    tab.classList.add("active");
    document.getElementById(tab.dataset.tab).classList.add("active");
  });
});

render(DB.latest);
</script>
